<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abwesenheiten heute</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef3f8;
    }

    .widget {
      padding: 12px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .eyebrow {
      font-size: 11px;
      color: #2563eb;
      font-weight: bold;
    }

    h1 {
      margin: 0;
      font-size: 20px;
    }

    .subline {
      font-size: 12px;
      color: #666;
    }

    .refresh-btn {
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
    }

    .summary {
      margin: 10px 0;
      padding: 10px;
      background: white;
      border-radius: 10px;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .panel {
      background: white;
      padding: 10px;
      border-radius: 10px;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: bold;
    }

    .card {
      background: #f8fbff;
      padding: 8px;
      border-radius: 8px;
      margin-bottom: 6px;
    }

    .empty {
      font-size: 12px;
      color: #777;
    }
  </style>
</head>
<body>
  <div class="widget">
    <div class="topbar">
      <div>
        <div class="eyebrow">Personio</div>
        <h1>Heute abwesend</h1>
        <div id="dateLabel" class="subline">Lade Daten ...</div>
      </div>

      <button id="refreshBtn" class="refresh-btn" type="button">⟳</button>
    </div>

    <div id="summary" class="summary">Lade Daten ...</div>

    <div class="grid">
      <div class="panel">
        <div class="panel-head">
          <h2>Im Urlaub</h2>
          <span id="vacationCount">0</span>
        </div>
        <div id="vacationList"></div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2>Sonst abwesend</h2>
          <span id="otherCount">0</span>
        </div>
        <div id="otherList"></div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://v0-vacation-today-api.vercel.app/api/vacation-today";

    const dateLabel = document.getElementById("dateLabel");
    const summary = document.getElementById("summary");
    const vacationList = document.getElementById("vacationList");
    const otherList = document.getElementById("otherList");
    const vacationCount = document.getElementById("vacationCount");
    const otherCount = document.getElementById("otherCount");
    const refreshBtn = document.getElementById("refreshBtn");

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function renderEmpty(target, text) {
      target.innerHTML = '<div class="empty">' + escapeHtml(text) + '</div>';
    }

    function renderCards(target, items) {
      if (!items || items.length === 0) {
        renderEmpty(target, "Keine Einträge");
        return;
      }

      target.innerHTML = items.map(function (e) {
        return (
          '<div class="card">' +
            '<strong>' + escapeHtml(e.name || "Unbekannt") + '</strong><br/>' +
            escapeHtml(e.type || "") + ' bis ' + escapeHtml(e.endDate || "") +
          '</div>'
        );
      }).join("");
    }

    async function loadData() {
      summary.textContent = "Lade Daten ...";

      try {
        const res = await fetch(API_URL, { cache: "no-store" });
        if (!res.ok) {
          throw new Error("API-Fehler: " + res.status);
        }

        const data = await res.json();

        const vacation = Array.isArray(data.vacation) ? data.vacation : [];
        const other = Array.isArray(data.otherAbsences) ? data.otherAbsences : [];
        const total = Number(data.totalCount || 0);

        dateLabel.textContent = "Stand: " + (data.date || "");
        vacationCount.textContent = String(vacation.length);
        otherCount.textContent = String(other.length);

        if (total === 0) {
          summary.textContent = "Heute ist niemand abwesend.";
        } else if (total === 1) {
          summary.textContent = "Heute ist 1 Mitarbeitende:r abwesend.";
        } else {
          summary.textContent = "Heute sind " + total + " Mitarbeitende abwesend.";
        }

        renderCards(vacationList, vacation);
        renderCards(otherList, other);
      } catch (e) {
        console.error(e);
        dateLabel.textContent = "Fehler beim Laden";
        summary.textContent = "Die Abwesenheiten konnten nicht geladen werden.";
        renderEmpty(vacationList, "Keine Daten verfügbar.");
        renderEmpty(otherList, "Keine Daten verfügbar.");
      }
    }

    refreshBtn.addEventListener("click", loadData);
    loadData();
  </script>
</body>
</html>
