<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abwesenheiten heute</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <div class="widget">

    <div class="topbar">
      <div>
        <div class="eyebrow">Personio</div>
        <h1>Heute abwesend</h1>
        <div id="dateLabel" class="subline">Lade Daten ...</div>
      </div>

      <button id="refreshBtn" class="refresh-btn">⟳</button>
    </div>

    <div id="summary" class="summary">Lade Daten ...</div>

    <div class="grid">
      <div class="panel">
        <div class="panel-head">
          <h2>Im Urlaub</h2>
          <span id="vacationCount">0</span>
        </div>
        <div id="vacationList"></div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2>Sonst abwesend</h2>
          <span id="otherCount">0</span>
        </div>
        <div id="otherList"></div>
      </div>
    </div>

  </div>

  <script src="./app.js"></script>
</body>
</html>
