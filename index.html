<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abwesenheiten 7 Tage</title>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#eef3f8; color:#18324d; }
    .widget { padding:12px; }
    .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    .eyebrow { font-size:11px; color:#2563eb; font-weight:bold; text-transform:uppercase; }
    h1 { margin:0; font-size:20px; }
    .subline { font-size:12px; color:#666; }
    .refresh-btn { border:none; background:#2563eb; color:#fff; border-radius:8px; padding:6px 10px; cursor:pointer; }
    .summary { margin:10px 0; padding:10px; background:#fff; border-radius:10px; font-weight:bold; }
    .day { background:#fff; border-radius:12px; padding:10px; margin-bottom:10px; }
    .day-head { display:flex; justify-content:space-between; margin-bottom:8px; }
    .count { font-size:12px; color:#2563eb; background:#eaf1ff; padding:4px 8px; border-radius:999px; }
    .cols { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .panel { background:#f8fbff; border-radius:8px; padding:8px; }
    .card { background:#fff; border-radius:6px; padding:6px; margin-bottom:4px; font-size:12px; }
    .empty { font-size:12px; color:#777; }
    @media (max-width:700px){ .cols{ grid-template-columns:1fr; } }
  </style>
</head>
<body>
<div class="widget">
  <div class="topbar">
    <div>
      <div class="eyebrow">Personio</div>
      <h1>Kommende 7 Tage</h1>
      <div id="dateLabel" class="subline">Lade Daten ...</div>
    </div>
    <button id="refreshBtn" class="refresh-btn">⟳</button>
  </div>

  <div id="summary" class="summary">Lade Daten ...</div>
  <div id="days"></div>
</div>

<script>
const API_URL = "https://v0-vacation-today-api.vercel.app/api/vacation-next-7-days";

function esc(v){return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");}

function renderList(items, emptyText){
  if(!items||items.length===0){return '<div class="empty">'+emptyText+'</div>';}
  return items.map(i=>'<div class="card"><b>'+esc(i.name)+'</b><br>'+esc(i.type)+' bis '+esc(i.endDate)+'</div>').join("");
}

async function load(){
  const summary=document.getElementById("summary");
  const daysEl=document.getElementById("days");
  const dateLabel=document.getElementById("dateLabel");

  summary.textContent="Lade Daten ...";

  try{
    const res=await fetch(API_URL);
    const data=await res.json();

    dateLabel.textContent="Zeitraum: "+data.rangeStart+" bis "+data.rangeEnd;
    summary.textContent="Abwesenheiten nächste 7 Tage";

    daysEl.innerHTML=data.days.map(d=>`
      <div class="day">
        <div class="day-head">
          <div>${d.label}</div>
          <div class="count">${d.totalCount}</div>
        </div>
        <div class="cols">
          <div class="panel">
            <b>Urlaub</b>
            ${renderList(d.vacation,"-")}
          </div>
          <div class="panel">
            <b>Sonst</b>
            ${renderList(d.otherAbsences,"-")}
          </div>
        </div>
      </div>
    `).join("");

  }catch(e){
    summary.textContent="Fehler beim Laden";
  }
}

document.getElementById("refreshBtn").onclick=load;
load();
</script>
</body>
</html>
